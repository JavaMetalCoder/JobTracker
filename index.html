<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Tracker (Vanilla)</title>
  <link rel="icon" href="./favicon.ico" sizes="any">
  <link rel="stylesheet" href="css/stili.css">
  <script src="js/app.js" defer></script>
</head>
<body>
  <header>
    <nav>

    </nav>
  </header>
  <main>
    <section id="box-main">
      <form action="#" id="appForm">
        <label for="companyInput">Azienda</label>
        <input name="company" type="text" id="companyInput" placeholder="Azienda" required>

        <label for="roleInput">Ruolo</label>
        <input name="role" type="text" id="roleInput" placeholder="Ruolo" required>

        <button type="submit" id="submitBtn">Aggiungi</button>

        <div id="errorBox" aria-live="polite"></div>

        
      </form>

      <ul id="list"></ul>
    </section>
  </main>
  
</body>
</html>
